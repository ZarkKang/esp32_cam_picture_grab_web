<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-CAM 智能拍照取物系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        header h1 {
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: #7f8c8d;
        }

        .container {
            display: flex;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .preview-card, .list-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            padding: 20px;
            flex: 1;
            min-width: 350px;
        }

        .preview-title, .list-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e3f2fd;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-warning { background: #ffc107; color: #222; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-sm { padding: 6px 10px; font-size: 0.8rem; }

        #status, #fetchStatus {
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }

        .photo-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .photo-item {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .photo-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .photo-name {
            padding: 8px;
            font-size: 0.85rem;
            background: #f8f9fa;
            text-align: center;
        }

        .photo-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            background: #f1f3f5;
        }

        /* ========== 右上角悬浮IP面板 ========== */
        .ip-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 8px;
            padding: 12px 15px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            z-index: 9999;
            min-width: 210px;
            font-size: 0.9rem;
        }

        .ip-title {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #e3f2fd;
        }

        .ip-item {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        .ip-item span:first-child { color: #7f8c8d; }
        .ip-item span:last-child { font-weight: 500; color: #2980b9; }

        @media (max-width: 768px) {
            .ip-panel {
                top: 10px;
                right: 10px;
                padding: 8px 10px;
                font-size: 0.8rem;
                min-width: 160px;
            }
            .container { flex-direction: column; }
            .preview-card, .list-card { min-width: 100%; }
        }
    </style>
</head>

<body>
    <header>
        <h1>方寸取物图片查询</h1>
        <p class="subtitle">方寸取物</p>
    </header>

    <!-- 右上角悬浮IP面板 -->
    <div class="ip-panel">
        <div class="ip-title">📶 设备IP</div>
        <div class="ip-item"><span>宿主机IP：</span><span id="hostIp">加载中...</span></div>
        <div class="ip-item"><span>摄像头IP：</span><span id="esp32Ip">加载中...</span></div>
    </div>

    <div class="container">
        <div class="preview-card">
            <div class="preview-title">操作面板</div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="capturePhoto()">📸 立即拍照</button>
                <button class="btn btn-success" onclick="refreshList()">🔄 刷新列表</button>
            </div>
            <div id="status"></div>
            <div id="fetchStatus"></div>
        </div>

        <div class="list-card">
            <div class="list-title">照片记录</div>
            <div id="photoList" class="photo-list"></div>
        </div>
    </div>

<script>
    // 记录上一次的照片列表和数量，用于对比差异
    let lastPhotoList = [];
    let checkTimer;

    window.onload = function () {
        initPhotoList(); // 首次初始化列表
        loadIPInfo();     // 加载IP信息
        startCheckUpdate(); // 启动数量检测定时器
    };

    // 启动定时检查（每1秒检查一次，仅差异时刷新）
    function startCheckUpdate() {
        if (checkTimer) clearInterval(checkTimer);
        checkTimer = setInterval(checkPhotoChange, 1000);
    }

    // 加载右上角设备IP
    function loadIPInfo() {
        fetch('/device_ips')
            .then(res => res.json())
            .then(data => {
                document.getElementById('hostIp').innerText = data.host_ip;
                document.getElementById('esp32Ip').innerText = data.esp32_ip;
            }).catch(err => console.log('IP加载失败：', err));
    }

    // 首次初始化照片列表（清空+全量渲染，仅页面加载时执行）
    function initPhotoList() {
        fetch('/photo_list')
            .then(res => res.json())
            .then(data => {
                lastPhotoList = data.photos || [];
                renderFullList(lastPhotoList);
            }).catch(err => console.log('列表初始化失败：', err));
    }

    // 检查照片列表是否变化（对比新老列表）
    function checkPhotoChange() {
        fetch('/photo_list')
            .then(res => res.json())
            .then(data => {
                const newPhotoList = data.photos || [];
                // 列表内容一致，不做任何操作
                if (JSON.stringify(newPhotoList) === JSON.stringify(lastPhotoList)) return;
                // 列表变化，执行局部刷新
                updatePhotoList(newPhotoList);
                // 更新缓存的旧列表
                lastPhotoList = [...newPhotoList];
            }).catch(err => console.log('检查列表变化失败：', err));
    }

    // 全量渲染列表（仅首次/手动刷新时用）
    function renderFullList(photos) {
        const listContainer = document.getElementById('photoList');
        listContainer.innerHTML = '';
        // 无照片时显示提示
        if (photos.length === 0) {
            listContainer.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#999">暂无照片</div>';
            return;
        }
        // 遍历创建照片节点
        photos.forEach(photo => {
            listContainer.appendChild(createPhotoItem(photo));
        });
    }

    // 局部更新列表（核心无闪烁逻辑：只增删差异节点）
    function updatePhotoList(newPhotos) {
        const listContainer = document.getElementById('photoList');
        const oldPhotos = [...lastPhotoList];

        // 1. 删除已被移除的照片节点（旧有、新列表无）
        oldPhotos.forEach(photo => {
            if (!newPhotos.includes(photo)) {
                const delItem = document.querySelector(`.photo-item[data-photo="${photo}"]`);
                delItem && listContainer.removeChild(delItem);
            }
        });

        // 2. 添加新增的照片节点（新有、旧列表无），插入到最顶部（保持倒序）
        newPhotos.forEach(photo => {
            if (!oldPhotos.includes(photo)) {
                const newItem = createPhotoItem(photo);
                listContainer.insertBefore(newItem, listContainer.firstChild);
            }
        });

        // 3. 无照片时补全提示
        if (newPhotos.length === 0 && listContainer.children.length > 0) {
            listContainer.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#999">暂无照片</div>';
        }
    }

    // 创建单个照片节点（复用函数，避免重复代码）
    function createPhotoItem(photoName) {
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.dataset.photo = photoName; // 标记唯一标识，用于后续删除
        // 时间戳防图片缓存，保证加载最新照片
        const photoUrl = `/static/photos/${photoName}?t=${new Date().getTime()}`;
        item.innerHTML = `
            <img src="${photoUrl}" alt="${photoName}">
            <div class="photo-name">${photoName}</div>
            <div class="photo-actions">
                <button class="btn btn-sm btn-warning" onclick="fetchItem('${photoName}')">取物</button>
                <button class="btn btn-sm btn-danger" onclick="deletePhoto('${photoName}')">删除</button>
            </div>`;
        return item;
    }

    // 拍照功能
    function capturePhoto() {
        const status = document.getElementById('status');
        status.style.display = 'block';
        status.className = '';
        status.innerText = '正在拍照...';
        fetch('/capture')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    status.className = 'success';
                    status.innerText = '✅ 拍照成功';
                } else {
                    status.className = 'error';
                    status.innerText = '❌ 失败：' + data.msg;
                }
                setTimeout(() => status.style.display = 'none', 2500);
            }).catch(err => {
                status.className = 'error';
                status.innerText = '❌ 拍照请求失败';
                setTimeout(() => status.style.display = 'none', 2500);
            });
    }

    // 手动刷新列表（保留原按钮功能，全量刷新）
    function refreshList() {
        initPhotoList();
        const status = document.getElementById('status');
        status.style.display = 'block';
        status.className = 'success';
        status.innerText = '✅ 列表已刷新';
        setTimeout(() => status.style.display = 'none', 1500);
    }

    // 删除照片功能（局部删除，无闪烁）
    function deletePhoto(photoName) {
        if (!confirm('确定删除该照片吗？删除后无法恢复！')) return;
        fetch(`/delete_photo/${photoName}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    // 直接删除节点，无需等定时器，即时无闪烁效果
                    const delItem = document.querySelector(`.photo-item[data-photo="${photoName}"]`);
                    delItem && delItem.parentElement.removeChild(delItem);
                    // 更新缓存列表
                    lastPhotoList = lastPhotoList.filter(item => item !== photoName);
                    // 无照片时补提示
                    if (lastPhotoList.length === 0) {
                        document.getElementById('photoList').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#999">暂无照片</div>';
                    }
                }
            }).catch(err => console.log('删除照片失败：', err));
    }

    // 取物功能
    function fetchItem(photoName) {
        const loc = photoName.split('_').pop().replace('.jpg', '');
        const fetchStatus = document.getElementById('fetchStatus');
        fetchStatus.style.display = 'block';
        fetchStatus.className = '';
        fetchStatus.innerText = '发送取物指令...';
        fetch('/fetch_item', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: 'fetch', location: loc })
        })
            .then(res => res.json())
            .then(data => {
                fetchStatus.className = data.status === 'ok' ? 'success' : 'error';
                fetchStatus.innerText = data.status === 'ok' ? '✅ 指令已发送' : '❌ 发送失败';
                setTimeout(() => fetchStatus.style.display = 'none', 2500);
            }).catch(err => {
                fetchStatus.className = 'error';
                fetchStatus.innerText = '❌ 指令请求失败';
                setTimeout(() => fetchStatus.style.display = 'none', 2500);
            });
    }

    // 页面卸载时清除定时器，优化性能
    window.onbeforeunload = function () {
        if (checkTimer) clearInterval(checkTimer);
    };
</script>
</body>
</html>
